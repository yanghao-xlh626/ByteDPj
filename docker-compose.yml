services:
  url-master:
    build: ./services/url-master # 新建的URL Master项目目录
    container_name: url-master
    hostname: url-master
    ports:
      - "8000:8000" # 暴露HTTP接口
    networks:
      - yuban_net
    command: tail -f /dev/null
    volumes:
      - type: bind
        source: ./services/url-master/data
        target: /app/data # 持久化存储URL状态
      - type: bind
        source: ./services/url-master/src
        target: /app/src/ #开发的时候同步代码

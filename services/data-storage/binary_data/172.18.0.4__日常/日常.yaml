comments:
- '大家日常生活中不经意间忽略的情绪，被这部番重新捡了起来，并以一种独特的方式进行了放大，也许这就是对细节的捕捉以及对情绪的把控吧。 '
- "假期补完了一直想看的《日常》，突然想写一些东西。\r\n\r\n刚看前两集的时候笑得岔气，心里想：这是什么玩意啊，太搞笑了。舍友还问我在看什么东西，笑得这么大声。谐音梗和冷笑话漫天飞，这就是它给我的初印象。\r\
  \n\r\n但是真的就是一部搞笑的动画吗？或许是，或许不是，但是至少我能从中 ... "
- "日常是个伪概念，其下隐藏的是两个概念：最优与众数。这两者在文明的社会中更容易重叠。\r\n常态是统计上的说法，也即众数。在被精心设计过的社会中，最优的形态方是常态。\r\
  \n在非洲的部落中，“唇盘”是众数，但在文明社会眼中并不是最优，不够效率，不够经济。假若一种概念能让社 ... "
- '2023.11.4 EP10。结尾的一段讲了祐子一直不想写作业的心理状态和表现出的行为。我恰巧也在这种状态..//2023.12.13 EP11：名乃和博士互相蒙眼，很是可爱。//2023.12.21
  EP12：看到丢球，突然能get到这部了。人生的许多快乐竟是这样的“无意义行为”，但是确实是开心的。 ... '
- '往年的看番选择基本是热门的大概率看（一般作画水平都不差），冷门的可能挑几部感觉有兴趣的看看，老番就根本没有兴趣去补，甚至过了两年的都不怎么想去看了。今年则是，主线补番，支线新番，而且是先补的京阿尼的番（不知不觉就化身粳米），导致了半年都沉浸在看完番的那种后劲里，可
  ... '

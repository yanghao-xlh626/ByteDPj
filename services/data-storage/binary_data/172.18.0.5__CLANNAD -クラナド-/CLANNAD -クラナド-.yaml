comments:
- ' 在ACG文化席卷全球的今天，动画作品早已突破单纯娱乐的边界，成为承载人类精神世界的容器。在众多催泪向作品中，《Clannad》系列犹如一颗璀璨的明珠，其光芒穿透了二次元的壁垒，在无数观众心中激荡起关于生命本质的思考。这部诞生于2007年的动画改编作品，以京都动画的
  ... '
- '很简单，这样的剧情不算有趣，从剧情设立以及底层逻辑都有问题，作为一部要调动情绪的动画在其专场领域却如此拉胯生硬，这无疑是失职的，用感性的眼光去看待它，得到的回馈却是一场又一场造作敷衍的戏。cl长达36集的校园篇无疑是败笔，写得校园不像校园，独角戏不像独角戏，最后
  ... '
- "十一月五号的访谈，是CL在电视上重映高清版本的。\r\n原文链接：https://jmagazine.myjcom.jp/category/anime/post000189/\r\
  \n基本没什么内容，有也是之前麻枝说过的，还是以营业为主。\r\n\r\n[https://imgse.com/i/pAcllqg]\r\n「CLANNAD」\r\
  \n\r\n京都动画制作的人气动画系列「CLANNAD」 ... "
- "风子篇，如果后面还有哭得这么稀里哗啦的篇章就再盘点一遍\r\n努力、爱得不到回应的悲剧超萌美少女；\r\n喜悦与伤感同在，把人类纯粹的哀喜玩弄于股掌的结局；\r\
  \n抒情的背景音乐敲动心灵，从钢琴到管弦再到人生逐步升级，让情绪持续升高突破阈值，最后以五味杂陈的团子大家族作完美 ... "
- "第一次看是好几年前 完全没看进去 这是二刷\r\n\r\n就后半部分的表现我不太喜欢渚反而更喜欢杏或是智代 这两位在智代线包括男主修罗场那几集让我感受很深 感觉相当勇敢主动\
  \ 落落大方 渚在这方面显得有点小家子气 特别是开演前跑去看大叔高中的录像 在我的上帝视角看 ... "

comments:
- "借我很喜欢的一首歌的歌名来写下这段观后感。\r\n\r\n消失这部剧场版相当优秀。在剧情上可以说完美承接了正片故事的时间，在吵吵闹闹高高兴兴的准备着圣诞活动的时候，阿虚一觉醒来发现自己身边和凉宫有关的一切消失了。这段对阿虚失魂落魄的表现可以说得益于剧场版的篇\
  \ ... "
- "未来的阿虚还得跟着朝比奈（下称未虚和未朝比奈）来到这个时空坐标，在阿虚被新朝仓刺中后再过来说这些话、把没注射的修正程序成功注射\r\n阿虚被刺伤失去意识后，因为是在世界被篡改期间所发生的事情，世界被修正回来后新朝仓不再存在，她造成的伤口自然也不再存在。\r\
  \n但是阿 ... "
- '凉宫系列一直是我最喜欢的动漫系列，是我心中最牛逼的校园题材动画，无论再看几次我都会给这部作品好评，不同于tv版的忧郁，这部消失给了我完全不同的感受，阿虚一直以来的人设就是普通加吐槽役，但在世界发生巨大变化的时候用惊人的行动力在两天集齐了分散的sos团并复原
  ... '
- "「凉宫春日的忧郁」「凉宫春日的消失」\r\n多久没有写这样七七八八的话了呢，这么一想，有半年了。虽说这半年来，动画看的非常少，相比起那之前，可以说是和动画完全脱节了。尽管还有看些二台什么的，但是正经的看动画什么的，总是一拖再拖。那就更不用说动画的评论了。想到之\
  \ ... "
- "如果说，凉宫春日在《忧郁》篇展现了一种勇于打破常态的活泼与灵性，那么长门有希则在《消失》篇带来了更加沉静而细腻的人文情感。\r\n\r\n一、凉宫春日与《忧郁》\r\
  \n\r\n春日在《忧郁》篇的形象有我行我素的一面，但个人看来，这一方面是春日展现活泼与灵性的剧情需要，一方面也难 ... "

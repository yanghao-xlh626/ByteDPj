comments:
- '第8回定期演奏会神奈川场 纪念一下 '
- '南方纯推特图，北宇治校服凉奶奶，魔法忍者乙哉，装神兔爷 '
- '京吹系列，我曾解读为温柔为内核的真实系校园里少女动物园一举一动、一颦一笑的浪漫故事，相较于现实中的矛盾冲突，动画做了大量柔化处理，少女贴贴闹闹哭哭使人暂时忘却了竞技的残酷性和利益冲突的矛盾，我们还能傻笑地感概“女孩子之间真的好啊”。在我没有读懂久美子
  ... '
- "在这里也发一遍吧，cv37292814\r\n如果让我来概括《吹响吧！上低音号》（以下简称“京吹”）这个作品的特点的话，大概就是“工整”。这个作品身上有很多标签，比如“细腻”“真实”“浪漫”“群像”……以上观点都不无道理，但我认为，真正让它身上能同时兼容这么多优秀标签的必\
  \ ... "
- '久美子到最後身為人的部分已經蕩然無存了，可能這就是奉獻精神吧，為了團體犧牲到這個程度我是不理解了，而京阿尼把這樣的人稱為大人，然而最後啟發久美子的居然是瀧升，一個連自己都管不好的人，這季動畫就是典型的教育觀眾的動畫，告訴你什麼是大人，製作組充滿了偏見和傲慢
  ... '

- "谈到轻音第二季，就没法不提贯穿全季的影子主题之一\"伤离别\"。观众随主角团在享受少女粉色青春的同时，也少不了在入眠前，还在心底里回味着那油然而生的，带有地方美学色彩的失落感。而将这空灵的浅色调哀伤抒诉得最有巧思的一集，当属承前启后的ep13残暑问候。\r\

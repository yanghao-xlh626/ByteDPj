title: ハチミツとクローバー II
comments:
- '喂喂喂(bgm30)，你们两个怎么回事，不是“父女”关系吗，到最后怎么变味了，父女之间的羁绊不比恋人强吗！！▇▇▇▇，她真的我哭死。 '
- "没有供养能力的穷小子主角最先出局，以真山和竹本反复强调了没有供养能力的男性不能让女性幸福的观点，作品结尾的一大主题由此穷图匕见。\r\n女主喜欢的、有供养能力，但“在一起就够了”“不用画了也可以”的期望与女主内心的愿望“只希望画画”不符的森田随后出局。\
  \ ... "
- '今天在b站看spitz相关的视频，看到一个蜂蜜与四叶草TV动画的音乐全收录。所以补这部的时候应该就是我第一次听到spitz的歌，不过现在对他们在这里面的几首歌基本已经是毫无印象，于是回去回顾了一下。那个时候并没有第一时间成为他们的粉丝，不过现在的话，这些插曲每首
  ... '
- "本剧和aria一样是楼主进入高中之前完结的一部作品，记得小的时候，没事就拿出来回忆一下，可能更多是感受一下大学和社会的氛围吧。\r\n\r\n如今楼主毕业多年，看到BD重置，突然剧情历历在目，却完全不敢打开重看。。。\r\
  \n\r\n也许。。。\r\n\r\n\r\n\r\n\r\n ... "
- '“十几岁的青春是你人生中最美好的时光”曾经听到别人这样说，但是对于正好处在那个年纪的我却完全没有体会到这句话的意思，不是自夸，因为高中时代的我完全就是一个标准的学霸，但是现在才体会到想要做成做好某一件事只有热情是远远不够的，不如说只有热情的话反而会适
  ... '
